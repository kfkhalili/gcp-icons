# Tag-based release: runs only when you push a tag matching v* (e.g. v1.0.3).
# Flow: bump version in package.json → commit & push to main → git tag vX.Y.Z → git push origin vX.Y.Z
# Uses npm Trusted Publishing (OIDC). One-time setup: npmjs.com → Package → Trusted Publisher → GitHub Actions, workflow: publish.yml
name: Release and publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write   # Required for npm Trusted Publishing (OIDC)
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22.14+ required for npm Trusted Publishing
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: npm publish
