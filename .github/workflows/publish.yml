name: Release and publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # allow pushing tags if you later add tagging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      # IMPORTANT:
      # - We expect the version to already be bumped in package.json in the commit merged to main.
      # - This job publishes that version to npm using the NPM_TOKEN secret (no OTP in CI).
      - name: Publish to npm
        if: github.ref == 'refs/heads/main'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish
